<!doctype html><html><head><meta charset="utf-8"><title>Icon directions</title>
<style>body{margin:0;font-family:system-ui,sans-serif;background:#eceef2;color:#1a1c1c}.w{max-width:940px;margin:0 auto;padding:44px 24px 80px}h1{font-family:Georgia,serif;font-size:28px;margin:0 0 4px}.s{color:#667;margin:0 0 28px}
.row{display:flex;gap:24px;flex-wrap:wrap}.o{background:#fff;border:1px solid #dde;border-radius:16px;padding:20px;text-align:center;width:200px}
.big{width:130px;height:130px;border-radius:24%;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.m{display:flex;gap:10px;justify-content:center;margin-top:12px}.m img{width:44px;height:44px;border-radius:24%}.m .s2{width:24px;height:24px}
b{display:block;margin-top:12px;font-size:15px}small{color:#778}
.cat{display:inline-block;font-size:10px;font-weight:800;border-radius:6px;padding:3px 8px;margin-top:6px}
.br{background:#e5ece0;color:#4B5D3F}.ed{background:#e7edf5;color:#2b5f91}</style></head>
<body><div class="w"><h1>Icon directions for a school ERP</h1><p class="s">Green tile, gold mark. Brand-abstract vs. category-clear.</p>
<div class="row">
<div class="o"><img class="big" src="assets/icons/_preview/optS.png"><b>A · “S” monogram</b><small>simplest, most app-like</small><br><span class="cat br">BRAND</span><div class="m"><img src="assets/icons/_preview/optS.png"><img class="s2" src="assets/icons/_preview/optS.png"></div></div>
<div class="o"><img class="big" src="assets/icons/_preview/v2-center.png"><b>B · Infinity + lotus</b><small>current, ownable</small><br><span class="cat br">BRAND</span><div class="m"><img src="assets/icons/_preview/v2-center.png"><img class="s2" src="assets/icons/_preview/v2-center.png"></div></div>
<div class="o"><img class="big" src="assets/icons/_preview/optCap.png"><b>C · Graduation cap</b><small>instantly “school”</small><br><span class="cat ed">EDUCATION</span><div class="m"><img src="assets/icons/_preview/optCap.png"><img class="s2" src="assets/icons/_preview/optCap.png"></div></div>
<div class="o"><img class="big" src="assets/icons/_preview/optBook.png"><b>D · Open book</b><small>“learning / records”</small><br><span class="cat ed">EDUCATION</span><div class="m"><img src="assets/icons/_preview/optBook.png"><img class="s2" src="assets/icons/_preview/optBook.png"></div></div>
</div></div></body></html>
